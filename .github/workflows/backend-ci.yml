name: 安电通后端 CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    name: 后端构建与测试
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译与测试
        run: mvn clean verify

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            backend/andt-user/target/*.jar
            backend/andt-inspection/target/*.jar
            backend/andt-order/target/*.jar
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    name: Docker 镜像构建
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送用户服务镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend/andt-user
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/andt-user:latest
            ${{ secrets.DOCKER_USERNAME }}/andt-user:${{ github.sha }}

      - name: 构建并推送检测服务镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend/andt-inspection
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/andt-inspection:latest
            ${{ secrets.DOCKER_USERNAME }}/andt-inspection:${{ github.sha }}

      - name: 构建并推送订单服务镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend/andt-order
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/andt-order:latest
            ${{ secrets.DOCKER_USERNAME }}/andt-order:${{ github.sha }}
