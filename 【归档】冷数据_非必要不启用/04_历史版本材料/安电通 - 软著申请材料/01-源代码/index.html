        theme: {
          extend: {
            fontFamily: {
              sans: ['PingFang SC', 'Microsoft YaHei', 'Heiti SC', 'sans-serif'],
            },
            padding: {
              'safe': 'env(safe-area-inset-bottom)',
            },

              'safe-bottom': 'env(safe-area-inset-bottom)',
              'safe-top': 'env(safe-area-inset-top)',
            }
          }
        }
      }

    <!-- Replace unpkg with BootCDN for faster access in China -->

    <style>
      /* Critical Layout Fix for Android WebView / Capacitor */
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none; /* Prevent rubber banding */
        -webkit-user-select: none; /* Disable selection */
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        background-color: #F8FAFC; /* 修改为浅灰色背景 */
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      body {
        /* Handle safe area for notched phones */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      /* --- Animations --- */
      
      /* Slide Up (For Sheets/Modals) - Smooth ease out */
      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        will-change: transform;
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      /* Fade Up (For Content) - Subtle rise */
      .animate-fade-up {
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity;
        opacity: 0;
      }
      @keyframes fadeUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      /* Fade In - General */
      .animate-fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        will-change: opacity;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Scale In - For Popups/Dialogs - Slight bounce */
      .animate-scale-in {
        animation: scaleIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        will-change: transform, opacity;
      }
      @keyframes scaleIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      
      /* Radar Animation */
      @keyframes radar-spin {
        0% { transform: scale(0.5); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      .animate-radar-spin {
        animation: radar-spin 3s infinite ease-out;
      }

      /* Leaflet Popup Customization */
      .leaflet-popup-content-wrapper {
        border-radius: 12px;
        padding: 0;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      }
      .leaflet-popup-content {
        margin: 8px;
        line-height: 1.4;
      }
      .leaflet-popup-tip {
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      .custom-avatar-marker {
        background: transparent;
        border: none;
      }
      .user-location-marker {
        background: transparent;
        border: none;
      }
      /* Ensure inputs are clickable and not zoomed */
      input, textarea, select {
        font-size: 16px; 
      }
    </style>
