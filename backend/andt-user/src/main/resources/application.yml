spring:
  application:
    name: andt-user
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:andt_user;DB_CLOSE_DELAY=-1;MODE=MySQL;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.andiantong.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8081
